apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-office-orchestrator
  namespace: ai-office
  labels:
    app: orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: ghcr.io/YOUR_ORG/ai-office/orchestrator:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: ai-office-secrets
            - configMapRef:
                name: ai-office-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-svc
  namespace: ai-office
spec:
  selector:
    app: orchestrator
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-office-frontend
  namespace: ai-office
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/YOUR_ORG/ai-office/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.aioffice.example.com"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://api.aioffice.example.com"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: ai-office
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-office-ingress
  namespace: ai-office
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - aioffice.example.com
        - api.aioffice.example.com
      secretName: ai-office-tls
  rules:
    - host: aioffice.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 3000
    - host: api.aioffice.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orchestrator-svc
                port:
                  number: 8000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-office-config
  namespace: ai-office
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  MAX_DEBATE_ROUNDS: "3"
  CONFIDENCE_THRESHOLD: "0.75"
  ESCALATION_THRESHOLD: "0.60"
  TASK_BUDGET_TOKENS: "4000"
  ADAPTIVE_AUTO_REGISTER: "false"
  CHROMA_HOST: "chromadb-svc"
  CHROMA_PORT: "8001"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orchestrator-hpa
  namespace: ai-office
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-office-orchestrator
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
